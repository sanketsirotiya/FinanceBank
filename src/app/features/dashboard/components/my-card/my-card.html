<div class="card-widget">
  <div class="widget-header">
    <h3 class="widget-title">My Card</h3>
  </div>

  @if (card) {
    <div class="total-balance-label">Card Balance</div>
    <div class="total-balance">{{ totalBalance | currency:'USD':'symbol':'1.3-3' }}</div>

    <div class="credit-card">
      <div class="card-glare"></div>
      <div class="card-top">
        <div>
          <div class="card-balance-label">Current Balance</div>
          <div class="card-balance">{{ card.balance | currency:'USD':'symbol':'1.2-2' }}</div>
        </div>
        <div class="mastercard-logo">
          <div class="mc-circle mc-left"></div>
          <div class="mc-circle mc-right"></div>
        </div>
      </div>
      <div class="card-bottom">
        <div class="card-number">{{ maskedCardNumber }}</div>
        <div class="card-expiry">{{ card.expiryDate }}</div>
      </div>
    </div>

    <div class="card-actions">
      <button class="btn-primary">Manage Cards</button>
      <button class="btn-secondary">Transfer</button>
    </div>
  }
</div>
